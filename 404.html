<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — quitedev.my.id</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #161310;
      --bg-soft: #1d1915;
      --ink: #f0e8d8;
      --ink-soft: #b8aa94;
      --ink-dim: #6e6452;
      --rule: #2a2520;
      --brass: #c9a35e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 10vw;
      min-height: 100vh;
    }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--brass);
      letter-spacing: 0.1em;
      margin-bottom: 28px;
    }
    .num {
      font-family: 'Fraunces', serif;
      font-size: clamp(120px, 18vw, 220px);
      font-weight: 300;
      line-height: 0.9;
      color: var(--ink);
      letter-spacing: -0.03em;
    }
    .num em { color: var(--brass); font-style: italic; }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 400;
      line-height: 1.15;
      max-width: 700px;
      margin-top: 32px;
      color: var(--ink);
    }
    h1 em { color: var(--brass); font-style: italic; font-weight: 300; }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--ink-soft);
      max-width: 540px;
      margin-top: 24px;
      font-weight: 300;
    }
    .actions {
      display: flex;
      gap: 16px;
      margin-top: 56px;
      flex-wrap: wrap;
    }
    a.btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      padding: 14px 22px;
      border: 1px solid var(--rule);
      color: var(--ink);
      text-decoration: none;
      transition: all 0.18s ease;
    }
    a.btn:hover { border-color: var(--brass); color: var(--brass); }
    a.btn.primary {
      background: var(--brass);
      color: var(--bg);
      border-color: var(--brass);
    }
    a.btn.primary:hover { background: transparent; color: var(--brass); }
    .meta {
      position: fixed;
      bottom: 32px;
      left: 10vw;
      font-size: 11px;
      color: var(--ink-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .meta em { color: var(--brass); font-style: italic; }
  </style>
</head>
<body>
  <div class="code">// 404 · not_found</div>
  <div class="num">4<em>0</em>4</div>
  <h1>That route didn't <em>resolve</em>.</h1>
  <p>The page you're looking for has moved, never existed, or you followed a broken link. Either way — the audit log will note this hit.</p>

  <div class="actions">
    <a class="btn primary" href="/">← Return home</a>
    <a class="btn" href="https://t.me/quitedevv">Reach out</a>
  </div>

  <div class="meta">© 2026 · <em>quitedev.my.id</em></div>
</body>
</html>
